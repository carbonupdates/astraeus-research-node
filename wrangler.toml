name = "astraeus-research-node"
main = "index.js"
compatibility_date = "2024-05-10"

# [STEP 1] Bind your Memory
# Get your KV ID from Cloudflare -> Storage -> KV
[[kv_namespaces]]
binding = "AGENT_STORAGE"
id = "95d8e8b2feab4f53a6d3287ed6b4d16f"

# [STEP 2] Bind your Brain
[ai]
binding = "AI"

# [STEP 3] Environment Variables
[vars]
HUB_URL = "https://hackathon.chakaap.com"
ENTITY_KEY = "test1"  # Replace "test1" with your Team Key

# [STEP 4] Automation
[triggers]
crons = ["0 0 * * *", "0 */3 * * *"]
